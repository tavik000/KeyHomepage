<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2280 1740" width="2280" height="1740">
  <!-- Background -->
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1e2a3a"/>
      <stop offset="100%" stop-color="#0a0e14"/>
    </radialGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="#000" flood-opacity="0.7"/>
    </filter>
  </defs>
  <rect width="2280" height="1740" fill="url(#bgGrad)"/>

  <!-- PS5 Case (portrait, centered) — 840×1180 case centred in 2280×1740 canvas -->
  <g transform="translate(720, 280)" filter="url(#shadow)">

    <!-- Case body (white) -->
    <rect x="0" y="0" width="840" height="1180" rx="18" ry="18" fill="#f0f0f0"/>

    <!-- PS5 blue header band -->
    <rect x="0" y="0" width="840" height="95" rx="18" ry="18" fill="#003791"/>
    <rect x="0" y="75" width="840" height="20" fill="#003791"/>

    <!-- PS5 logo (styled text) -->
    <text x="420" y="62" font-family="'Arial Black', Arial, sans-serif" font-weight="900"
          font-size="52" fill="#ffffff" text-anchor="middle" letter-spacing="4">PS5</text>

    <!-- PlayStation symbol icons in header -->
    <text x="48" y="64" font-family="Arial, sans-serif" font-size="22"
          fill="rgba(255,255,255,0.45)" text-anchor="start">△  ○  ✕  □</text>

    <!-- Game art area -->
    <image href="BeastOfReincarnation.jpg" x="0" y="95" width="840" height="960" preserveAspectRatio="xMidYMid slice"/>

    <!-- Question mark overlay -->
    <text x="420" y="625" font-family="'Arial Black', Arial, sans-serif" font-weight="900"
          font-size="520" fill="rgba(0,0,0,0.35)" text-anchor="middle"
          dominant-baseline="middle">?</text>
    <text x="420" y="625" font-family="'Arial Black', Arial, sans-serif" font-weight="900"
          font-size="380" fill="rgba(255,255,255,0.75)" text-anchor="middle"
          dominant-baseline="middle">?</text>

    <!-- Bottom info strip -->
    <rect x="0" y="1055" width="840" height="125" fill="#e8e8e8"/>
    <rect x="0" y="1055" width="840" height="3" fill="#cccccc"/>

    <!-- PEGI / rating placeholder -->
    <rect x="22" y="1070" width="56" height="70" rx="6" fill="#003791"/>
    <text x="50" y="1115" font-family="'Arial Black', Arial, sans-serif" font-weight="900"
          font-size="30" fill="#ffffff" text-anchor="middle">?</text>

    <!-- Title text on box -->
    <text x="420" y="1105" font-family="'Arial Black', Arial, sans-serif" font-weight="900"
          font-size="28" fill="#222222" text-anchor="middle" letter-spacing="2">CONFIDENTIAL PROJECT</text>
    <text x="420" y="1140" font-family="Arial, sans-serif" font-size="20"
          fill="#555555" text-anchor="middle" letter-spacing="1">Action RPG</text>

    <!-- Bottom case edge -->
    <rect x="0" y="1162" width="840" height="18" rx="0" ry="0" fill="#d0d0d0"/>
    <rect x="0" y="1162" width="840" height="18"
          rx="0" ry="0" fill="none" stroke="#bbb" stroke-width="1"/>

    <!-- Case outline -->
    <rect x="0" y="0" width="840" height="1180" rx="18" ry="18"
          fill="none" stroke="#888" stroke-width="2"/>
  </g>
</svg>
